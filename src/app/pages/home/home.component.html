<app-hero />
<section class="c-section" id="products">
  <div class="c-wrap">
    <div class="c-sec-head">
      <div>
        <span class="c-mono c-sec-eyebrow">// the suite</span>
        <h2 class="c-sec-title">
          Three products. <em>One quiet</em> philosophy: do less, but do it well.
        </h2>
      </div>
      <p class="c-sec-sub">Each one solves a single problem with care. Use one, use all three — your account works across them.</p>
    </div>
    <div class="row g-3">
      <div class="col-12 col-md-4" *ngFor="let p of products">
        <app-product-card [product]="p" />
      </div>
    </div>
  </div>
</section>
